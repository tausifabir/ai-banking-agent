<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank AI Assistant</title>

    <style>
        :root {
            --primary: #0a66c2;
            --bg: #f5f7fb;
            --bot: #eef2f7;
            --user: #0a66c2;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: var(--bg);
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        .sidebar h3 {
            margin-top: 0;
        }

        .sidebar button {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #eef3ff;
            cursor: pointer;
        }

        /* Main Chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
        }

        .user {
            align-self: flex-end;
            background: var(--user);
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: var(--bot);
        }

        /* Footer */
        .footer {
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        button.send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        .typing {
            font-size: 12px;
            color: gray;
        }

    </style>
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>🏦 Menu</h3>
        <button onclick="quick('loan')">Loan Info</button>
        <button onclick="quick('account')">Account Opening</button>
        <button onclick="quick('interest')">Interest Rate</button>

        <h4>Loans</h4>
        <select onchange="selectLoan(this.value)">
            <option value="">Select Loan</option>
            <option>Personal Loan</option>
            <option>AGAMI Personal Loan</option>
            <option>Home Loan</option>
            <option>TARA Uddokta SME Loan</option>
            <option>SME Loan</option>
        </select>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="header">AI Banking Assistant</div>

        <div id="chat" class="chat-box"></div>

        <div class="footer">
            <div class="input-row">
                <input id="msg" placeholder="Ask something..." onkeypress="enter(event)" />
                <button class="send" onclick="send()">Send</button>
            </div>
        </div>

    </div>
</div>

<script>

    function add(type, text) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function enter(e) {
        if (e.key === "Enter") send();
    }

    function quick(type) {
        if (type === "loan") {
            add("bot", "Select a loan from the left menu.");
            return;
        }
        sendToBackend(type);
    }

    function selectLoan(val) {
        if (!val) return;
        add("user", val);
        sendToBackend(val);
    }

    function send() {
        const input = document.getElementById("msg");
        const text = input.value.trim();
        if (!text) return;
        add("user", text);
        input.value = "";
        sendToBackend(text);
    }

    function sendToBackend(message) {

        addTyping();

        fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        })
            .then(res => res.text())
            .then(data => {
                removeTyping();
                add("bot", data);
            });
    }

    function addTyping() {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.id = "typing";
        div.className = "typing";
        div.innerText = "Thinking...";
        chat.appendChild(div);
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

</script>

</body>
</html>
