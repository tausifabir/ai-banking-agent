<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Banking Assistant</title>

    <style>
        :root {
            --primary: #0a66c2;
            --bg: #f6f8fc;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
        }

        /* Base */
        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: var(--bg);
        }

        /* Layout */
        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--card);
            border-right: 1px solid #eee;
            padding: 20px;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: var(--text);
        }

        .sidebar button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            background: #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
        }

        .sidebar button:hover {
            background: #e2e8f0;
        }

        .sidebar select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 14px 20px;
            font-weight: 600;
        }

        /* Chat */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Message */
        .msg {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: white;
        }

        /* Input area */
        .input-area {
            background: white;
            padding: 12px;
            border-top: 1px solid #eee;
        }

        .input-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 25px;
        }

        /* Input */
        input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
        }

        /* Buttons */
        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        .upload-btn {
            cursor: pointer;
            font-size: 18px;
        }

        /* Typing */
        .typing {
            font-size: 12px;
            color: var(--muted);
        }

        /* File name */
        .file-name {
            font-size: 12px;
            color: var(--muted);
            margin-left: 10px;
        }
    </style>
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>🏦 Banking</h3>

        <button onclick="quick('loan')">Loan Info</button>
        <button onclick="quick('account')">Open Account</button>
        <button onclick="quick('interest')">Interest Rate</button>

        <h4>Loans</h4>
        <select onchange="selectLoan(this.value)">
            <option value="">Select Loan</option>
            <option>Personal Loan</option>
            <option>Home Loan</option>
            <option>SME Loan</option>
        </select>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="header">AI Banking Assistant</div>

        <div id="chat" class="chat"></div>

        <div class="input-area">

            <div class="input-box">

                <span class="upload-btn" onclick="openFile()">📎</span>
                <input id="msg" placeholder="Ask anything or upload..." onkeypress="enter(event)" />
                <button class="send-btn" onclick="send()">Send</button>

                <input type="file" id="fileInput" hidden accept=".pdf,image/*" />
            </div>

            <div id="fileName" class="file-name"></div>

        </div>

    </div>

</div>

<script>

    function add(type, text) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "msg " + type;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function enter(e) {
        if (e.key === "Enter") send();
    }

    function quick(type) {
        sendToBackend(type);
    }

    function selectLoan(val) {
        if (!val) return;
        add("user", val);
        sendToBackend(val);
    }

    function openFile() {
        document.getElementById("fileInput").click();
    }

    document.getElementById("fileInput").addEventListener("change", function () {
        const file = this.files[0];
        document.getElementById("fileName").innerText = file ? file.name : "";
    });

    function send() {

        const input = document.getElementById("msg");
        const fileInput = document.getElementById("fileInput");

        const text = input.value.trim();
        const file = fileInput.files[0];

        if (!text && !file) return;

        if (file && file.size > 5 * 1024 * 1024) {
            add("bot", "File must be under 5MB.");
            return;
        }

        if (text) add("user", text);
        if (file) add("user", "📎 " + file.name);

        input.value = "";
        fileInput.value = "";
        document.getElementById("fileName").innerText = "";

        sendToBackend(text, file);
    }

    function sendToBackend(message, file) {

        addTyping();

        const formData = new FormData();
        if (message) formData.append("message", message);
        if (file) formData.append("file", file);

        fetch("/api/chat", {
            method: "POST",
            body: formData
        })
            .then(res => res.text())
            .then(data => {
                removeTyping();
                add("bot", data);
            })
            .catch(() => {
                removeTyping();
                add("bot", "Error occurred.");
            });
    }

    function addTyping() {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.id = "typing";
        div.className = "typing";
        div.innerText = "Thinking...";
        chat.appendChild(div);
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

</script>

</body>
</html>
